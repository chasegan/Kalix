[kalix]

[inputs]
exist = data_storage_exists.csv
inflow = data_inflow.csv
demand = data_demand.csv

[node.inflow]
loc = 0, 0
type = inflow
inflow = data.inflow.by_index.1
ds_1 = storage_permanent

[node.storage_permanent]
loc = 0, 50
type = storage 
initial_volume = 500
dimensions = Level [m], Volume [ML], Area [km2], Spill [ML], 
             0        , 0          , 0         , 0, 
             10       , 2000       , 10        , 0,
             11       , 2100       , 10        , 1000,
ds_1 = storage_ephemeral


[node.storage_ephemeral]
loc = 0, 100
type = storage 
exists = data.exist.by_index.1
dimensions = Level [m], Volume [ML], Area [km2], Spill [ML], 
             0        , 0          , 0         , 0, 
             10       , 2000       , 10        , 0, 
             11       , 2100       , 10        , 1000,
ds_1 = gauge

[node.gauge]
loc = 0, 150
type = gauge
ds_1 = user

[node.user]
type = regulated_user
loc = 0, 200
order = data.demand.by_index.1
ds_1 = blackhole

[node.blackhole]
type = blackhole 
loc = 0, 250

[outputs]
node.blackhole.usflow
node.storage_permanent.usflow
node.storage_permanent.ds_1
node.storage_permanent.volume
node.storage_ephemeral.usflow
node.storage_ephemeral.volume
node.storage_ephemeral.exists
node.inflow.inflow
node.user.diversion
node.user.demand
