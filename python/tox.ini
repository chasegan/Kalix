[tox]
envlist = py39,py310,py311,py312,py313,py314
isolated_build = true

# Minimum tox version
minversion = 4.0

[testenv]
package = wheel
description = Run tests with pytest against Python {envname}

# Install build dependencies
deps =
    pytest>=7
    numpy>=1.22
    pandas>=1.5

# Run tests
commands =
    pytest {posargs:-v}

# Set environment variables
setenv =
    RUST_BACKTRACE = 1

[testenv:dev]
# Development environment with editable install
description = Development environment for running tests during development
deps =
    pytest>=7
    numpy>=1.22
    pandas>=1.5

commands_pre =
    pip install -e .

commands =
    pytest {posargs:-v}
