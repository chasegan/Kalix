name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JDK_VERSION: '23'

jobs:
  rust-test:
    name: Rust (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: macos-latest
            platform: macOS
          - os: windows-latest
            platform: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Rust tests
        run: cargo test

  java-test:
    name: Java (${{ matrix.platform }})
    needs: rust-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: macos-latest
            platform: macOS
          - os: windows-latest
            platform: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}
      - name: Java tests
        working-directory: kalixide
        shell: bash
        run: ./gradlew test --no-daemon

  python-test:
    name: Python ${{ matrix.python-version }} (${{ matrix.platform }})
    needs: rust-test
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: macos-latest
            platform: macOS
          - os: windows-latest
            platform: Windows
        exclude:
          - os: macos-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.11'
          - os: macos-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.13'
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.13'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Python tests
        working-directory: python
        shell: bash
        run: |
          pip install tox>=4.0
          tox -e py$(echo "${{ matrix.python-version }}" | tr -d '.')

  regression-test:
    name: Regression tests (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: macos-latest
            platform: macOS
          - os: windows-latest
            platform: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and install kalix
        working-directory: python
        shell: bash
        run: |
          pip install maturin
          maturin build --release --out dist
          pip install dist/*.whl
      - name: Install test dependencies
        run: pip install numpy
      - name: Regression tests
        run: python regression_tests/simulations/verify_all_models.py
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-logs-${{ matrix.platform }}
          path: |
            regression_tests/**/*.log
            regression_tests/**/*.diff
            regression_tests/simulations/verify_all_models_log.txt
          if-no-files-found: ignore
