[kalix]
start = 0001-01-01
end = 0201-01-01

# 200 years of daily timesteps = ~73,000 simulation steps.
# Each inflow expression below contains many built-in function calls
# (sin, cos, sqrt, abs, pow, exp, min, max) so that function dispatch
# is a meaningful fraction of total simulation cost — useful for
# benchmarking expression-engine changes such as parse-time function
# resolution. The expressions are otherwise arbitrary; physical
# meaning is not relevant.

[constants]
c.a = 1.234
c.b = 2.345
c.c = 3.456
c.d = 0.123
c.e = 0.789

# Each node has a function-heavy inflow expression. Multiple nodes are
# used so the total work per timestep grows — roughly 15 function calls
# per node × 8 nodes × 73,000 timesteps ≈ 8.7M function-dispatch events
# per full simulation run.

[node.n1]
loc = 0,0
type = inflow
inflow = abs(sin(sim.step * 0.01) + cos(sim.step * 0.02)) * sqrt(abs(sim.day_of_year)) + max(c.a, c.b) * min(c.c, sin(c.a + sim.month)) + pow(abs(cos(sim.year * 0.001)), 0.5) + exp(-abs(sim.step * 0.0001))

[node.n2]
loc = 1,0
type = inflow
inflow = sqrt(abs(sin(sim.step * 0.02))) + cos(sim.day_of_year * c.d) * sin(c.b * sim.month) + max(abs(c.e), min(c.a, c.c)) + pow(abs(cos(sim.step * 0.005)), c.d) + exp(-abs(sin(sim.year * 0.01)))

[node.n3]
loc = 2,0
type = inflow
inflow = abs(cos(sim.step * 0.015)) + sqrt(abs(sin(sim.day_of_year * 0.02))) * max(c.a, c.b, c.c) + min(sin(sim.month), cos(sim.month)) * pow(abs(c.e), 0.7) + exp(-abs(cos(sim.step * 0.0002)))

[node.n4]
loc = 3,0
type = inflow
inflow = sin(c.a * sim.step * 0.003) + cos(c.b * sim.step * 0.004) + sqrt(abs(c.c + sin(sim.day_of_year * 0.01))) + max(abs(c.a), abs(c.b)) * min(c.d, c.e) + pow(abs(sin(sim.year * 0.05)), 0.3) + exp(-abs(c.a + sim.step * 0.0003))

[node.n5]
loc = 4,0
type = inflow
inflow = abs(sin(sim.step * 0.007) * cos(sim.step * 0.009)) + sqrt(abs(sim.day_of_year)) + max(sin(c.a), cos(c.b)) * min(sin(c.c), cos(c.d)) + pow(abs(sim.month - 6.5), 0.8) + exp(-abs(sim.step * 0.00015))

[node.n6]
loc = 5,0
type = inflow
inflow = sqrt(abs(c.a * sin(sim.step * 0.011))) + abs(cos(c.b * sim.day_of_year * 0.013)) + max(c.a, c.b, c.c, c.d, c.e) * sin(sim.month * 0.5) + pow(abs(cos(sim.year * 0.002)), c.e) + exp(-abs(sim.step * 0.00012))

[node.n7]
loc = 6,0
type = inflow
inflow = abs(sin(sim.step * 0.0025) - cos(sim.step * 0.0035)) * sqrt(abs(sim.day_of_year + c.a)) + min(abs(c.a), abs(c.b)) * max(sin(c.c), cos(c.d)) + pow(abs(sin(sim.month * c.d)), 0.4) + exp(-abs(cos(sim.year * 0.0007)))

[node.n8]
loc = 7,0
type = inflow
inflow = abs(sin(sim.step * 0.0125)) + sqrt(abs(cos(sim.day_of_year * 0.025))) * max(c.b, c.c) + min(sin(c.a + sim.month), cos(c.b * sim.month)) + pow(abs(c.e + sim.day * 0.01), 0.6) + exp(-abs(sin(sim.year * 0.003)))

[outputs]
node.n1.ds_1
node.n2.ds_1
node.n3.ds_1
node.n4.ds_1
node.n5.ds_1
node.n6.ds_1
node.n7.ds_1
node.n8.ds_1
